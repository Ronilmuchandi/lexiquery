# =============================================================
# FILE: config/model_config.yaml
# PURPOSE: Configuration settings for LLM and embedding models
# =============================================================

llm:
  provider: groq
  model: llama-3.3-70b-versatile
  temperature: 0.1
  max_tokens: 2048

embeddings:
  model: all-MiniLM-L6-v2
  batch_size: 32

vector_store:
  provider: chromadb
  collection_name: legal_contracts
  similarity_metric: cosine
  n_results: 4

chunking:
  min_chunk_size: 100
  max_chunk_size: 2000